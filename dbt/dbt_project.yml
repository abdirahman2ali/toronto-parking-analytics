name: toronto_parking_dbt
version: "1.0.0"
config-version: 2

profile: toronto_parking_dbt

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  toronto_parking_dbt:
    +engine: MergeTree()
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: view
      +schema: intermediate
    marts:
      facts:
        +materialized: incremental
        +schema: marts
      dims:
        +materialized: table
        +schema: marts
      reporting:
        +materialized: table
        +schema: marts
