toronto_parking_dbt:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('TORONTO_PGHOST') }}"
      port: "{{ env_var('TORONTO_PGPORT', '5432') | int }}"
      dbname: "{{ env_var('TORONTO_PGDATABASE') }}"
      user: "{{ env_var('TORONTO_PGUSER') }}"
      password: "{{ env_var('TORONTO_PGPASSWORD') }}"
      schema: toronto
      threads: 4
      sslmode: require
      connect_timeout: 10
